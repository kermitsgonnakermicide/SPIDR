controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0 # High freq for hexapod stability
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]

    # Progress Checker
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 15.0

    # Goal Checker
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    
    # MPPI Controller - Predictive 3D Awareness
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.100 # MUST MATCH 1/controller_frequency (10Hz)
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      vtheta_std: 0.1
      vx_max: 0.5
      vx_min: -0.3
      vy_max: 0.0
      vtheta_max: 0.5
      vtheta_min: -0.5
      iteration_count: 1
      pruning_distance: 1.7
      transform_tolerance: 2.0
      enforce_path_costs: true
      visualize: true
      motion_model: "DiffDrive" # Hexapod moves like a diff drive base
      critics: ["ConstraintCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "ObstaclesCritic"]
      ConstraintCritic.cost_weight: 4.0
      GoalCritic.cost_weight: 4.0
      GoalAngleCritic.cost_weight: 3.0
      PathAlignCritic.cost_weight: 5.0
      PathFollowCritic.cost_weight: 5.0
      PathAngleCritic.cost_weight: 3.0
      ObstaclesCritic.cost_weight: 6.0
      ObstaclesCritic.consider_footprint: true
      ObstaclesCritic.collision_cost: 1000000.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.5
      use_cost_map: true
      allow_unknown: true
      max_iterations: 1000000
      max_planning_time: 2.0
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 3.0  # Increased from 1.0 for faster dynamic response
      publish_frequency: 3.0  # Increased from 1.0
      global_frame: map
      robot_base_frame: spooder/base_footprint
      use_sim_time: True
      controller_frequency: 15.0  # Increased from 10.0 for better reactivity
      # REALISTIC FOOTPRINT FOR 0.8m BODY + LEGS (1.0m total width)
      footprint: "[ [0.4, 0.5], [0.4, -0.5], [-0.4, -0.5], [-0.4, 0.5] ]"
      resolution: 0.05
      rolling_window: false
      track_unknown_space: true
      plugins: ["static_layer", "voxel_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: True
        subscribe_to_updates: True
        transform_tolerance: 2.0
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.125
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan camera_pointcloud
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
        camera_pointcloud:
          topic: /camera/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.25
          max_obstacle_height: 2.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.1
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          clearing: True
          marking: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          min_obstacle_height: 0.16
          obstacle_max_range: 2.5
          obstacle_min_range: 0.1
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.3
      always_send_full_costmap: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 8.0  # Increased from 5.0 for faster dynamic response
      publish_frequency: 2.0
      global_frame: spooder/odom
      robot_base_frame: spooder/base_footprint
      use_sim_time: True
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # SYNCHRONIZED FOOTPRINT (1.0m total width)
      footprint: "[ [0.4, 0.5], [0.4, -0.5], [-0.4, -0.5], [-0.4, 0.5] ]"
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.125
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan camera_pointcloud
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
        camera_pointcloud:
          topic: /camera/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.25
          max_obstacle_height: 2.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.1
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          clearing: True
          marking: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.3
      always_send_full_costmap: True

collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "spooder/base_footprint"
    odom_frame_id: "spooder/odom"
    transform_tolerance: 0.1
    source_timeout: 0.5 # Increased from 0.1 to handle simulation lag
    base_shift_correction: True
    observation_sources: ["scan"]  # Removed camera_pointcloud due to timestamp lag
    polygons: ["Footprint"]
    Footprint:
      type: "polygon"
      prediction_type: "none"
      points: "[[0.4, 0.5], [0.4, -0.5], [-0.4, -0.5], [-0.4, 0.5]]"
      action_type: "slowdown"
      slowdown_ratio: 0.5
      min_height: 0.16
      max_height: 2.0
    scan:
      type: "scan"
      topic: "/scan"
    camera_pointcloud:
      type: "pointcloud"
      topic: "/camera/points"
      min_height: 0.16
      max_height: 2.0

docking_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0
    dock_plugins: ["simple_dock"]
    simple_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.1
      staging_timeout: 300.0


unstuck_monitor:
  ros__parameters:
    use_sim_time: True
    
    # Time threshold for considering robot stuck (seconds)
    stuck_timeout: 8.0
    
    # Minimum velocity to consider robot moving (m/s)
    min_velocity_threshold: 0.01
    
    # Maximum radius for oscillation detection (meters)
    oscillation_radius: 0.15
    
    # Maximum time allowed for recovery behaviors (seconds)
    recovery_timeout: 30.0
    
    # Number of position samples to track for oscillation detection
    position_history_size: 50

