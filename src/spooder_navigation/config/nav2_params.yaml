amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "spooder/base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_beams: 60
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "spooder/odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel" # EKF provides odom, we treat as diff for AMCL
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 2.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan
behavior_server:
  ros__parameters:
    use_sim_time: True
    local_frame: spooder/odom
    global_frame: map
    robot_base_frame: spooder/base_footprint
    transform_tolerance: 2.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    wait:
      plugin: "nav2_behaviors::Wait"
    cycle_frequency: 10.0
    # Fix behaviors looking for 'odom' instead of 'spooder/odom'
    spin:
      plugin: "nav2_behaviors::Spin"
      local_frame: spooder/odom
    backup:
      plugin: "nav2_behaviors::BackUp"
      local_frame: spooder/odom
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
      local_frame: spooder/odom
    odom_topic: /odom

